<style>

    color: var(--accent);

  }
  .header .brand span { color: #3b82f6; }
  .header .sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .header .date { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }

  .card {
    background: var(--card);

  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;

  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .card-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #edf2f7;
    color: var(--text-sub);
    font-weight: 500;
  }

  /* Market State */
  .market-red { background: var(--danger-bg); border: 1.5px solid var(--danger-border); }
  .market-yellow { background: var(--warn-bg); border: 1.5px solid var(--warn-border); }
  .market-green { background: var(--ok-bg); border: 1.5px solid var(--ok-border); }
  .market-state {
    text-align: center;
    padding: 20px 16px;

  .market-state .icon { font-size: 36px; margin-bottom: 4px; }
  .market-state .label { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .market-state .detail { font-size: 13px; color: var(--text-sub); }

  .market-warn {

    color: var(--red);
    text-align: center;

    padding: 3px 10px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .stock-metrics {

    grid-template-columns: repeat(3, 1fr);

  .metric {
    text-align: center;
    padding: 10px 4px;
    background: #f7fafc;
    border-radius: 10px;
  }
  .metric .val { font-size: 18px; font-weight: 700; }
  .metric .lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    margin-top: 12px;

(function() {
  var HASH = 'bc9ca564296f4a1022c7662c912775a5445cdac4f992851c00845c26c75d4531';
  if (sessionStorage.getItem('_pw') === HASH) {
    document.getElementById('pwGate').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    return;
  }
  async function sha256(msg) {
    var buf = new TextEncoder().encode(msg);
    var hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
  }
  async function tryLogin() {
    var pw = document.getElementById('pwInput').value;
    var h = await sha256(pw);
    if (h === HASH) {
      sessionStorage.setItem('_pw', HASH);
      document.getElementById('pwGate').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    } else {
      document.getElementById('pwError').style.display = 'block';
      document.getElementById('pwInput').value = '';
    }
  }
  document.getElementById('pwInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });
  document.getElementById('pwBtn').addEventListener('click', tryLogin);
})();
