name: Daily Stock Pick

on:
  schedule:
    # 北京时间 16:17（主：A股收盘后1h17m，UTC08:17=美东凌晨04:17空闲，避开整点高峰）
    - cron: '17 8 * * 1-5'
    # 北京时间 16:47（备用：同空闲窗口错峰30分，防单次排队/失败）
    - cron: '47 8 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-pick
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: Ensure dashboard template
        run: |
          if [ ! -f dashboard/index.html ]; then
            echo "WARNING: dashboard/index.html missing, restoring from git object"
            git show HEAD:dashboard/index.html > dashboard/index.html
          fi
          ls -la dashboard/index.html

      - name: Run stock screener (内置重试3次)
        run: |
          sleep $((RANDOM % 300))
          for i in 1 2 3; do
            echo "========== 选股尝试 $i/3 =========="
            if python scripts/cloud_runner.py; then
              echo "========== 尝试 $i 成功 =========="
              exit 0
            fi
            echo "========== 尝试 $i 失败，3分钟后重试 =========="
            sleep 180
          done
          echo "========== 3次均失败 =========="
          exit 1
        env:
          PYTHONIOENCODING: utf-8

      - name: Deploy to Pages
        if: hashFiles('_site/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: 部署成功通知
        if: success() && hashFiles('_site/index.html') != ''
        run: echo "✅ $(date '+%Y-%m-%d %H:%M') 选股看板已更新"
