name: Daily Stock Pick

on:
  schedule:
    # 北京时间 08:00-09:55 每5分钟（自愈：已部署则跳过）
    - cron: '0-55/5 0,1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock screener
        run: python scripts/cloud_runner.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Deploy to Pages
        if: hashFiles('_site/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
